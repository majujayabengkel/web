<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Settings</title>
    <link rel="stylesheet" href="../style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/assets/js/layout.js" defer></script>
    <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 transition-colors duration-300 font-sans">
    
    <admin-layout>
        <div x-data="settingsApp()" x-init="init()" class="w-full max-w-4xl mx-auto space-y-8 pb-12">
            
            <div>
                <h2 class="text-2xl font-extrabold text-slate-900 dark:text-white tracking-tight">Konfigurasi Global</h2>
                <p class="text-slate-500 dark:text-slate-400 mt-1 text-sm">Kelola identitas utama, integrasi API, dan keamanan akun Anda.</p>
            </div>

            <section class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden">
                <div class="px-6 py-5 border-b border-slate-200 dark:border-slate-700 bg-slate-50/50 dark:bg-slate-800/50 flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-blue-100 dark:bg-blue-900/50 flex items-center justify-center text-blue-600 dark:text-blue-400">
                        <i class="ph-fill ph-globe text-lg"></i>
                    </div>
                    <h3 class="font-bold text-lg text-slate-800 dark:text-white">Identitas Website</h3>
                </div>
                
                <div class="p-6 md:p-8 space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-1.5">
                            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">Nama Website / Brand</label>
                            <input type="text" x-model="config.site_name" class="w-full px-4 py-2.5 border border-slate-300 dark:border-slate-600 rounded-xl bg-white dark:bg-slate-900 dark:text-white focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 outline-none">
                        </div>
                        <div class="space-y-1.5">
                            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">WhatsApp Admin</label>
                            <input type="text" x-model="config.site_wa" class="w-full px-4 py-2.5 border border-slate-300 dark:border-slate-600 rounded-xl bg-white dark:bg-slate-900 dark:text-white focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 outline-none" placeholder="62812345...">
                        </div>
                    </div>

                    <div class="space-y-1.5">
                        <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">Deskripsi Singkat (Footer)</label>
                        <textarea x-model="config.site_desc" rows="2" class="w-full px-4 py-3 border border-slate-300 dark:border-slate-600 rounded-xl bg-white dark:bg-slate-900 dark:text-white focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 outline-none resize-none"></textarea>
                    </div>
                    
                    <div class="bg-slate-50 dark:bg-slate-900/50 p-5 rounded-xl border border-slate-200 dark:border-slate-700">
                        <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-4">Logo Utama Website</label>
                        <div class="flex flex-col sm:flex-row items-start sm:items-center gap-5">
                            <div class="w-24 h-24 bg-white dark:bg-slate-800 border-2 border-dashed border-slate-300 dark:border-slate-600 rounded-xl flex items-center justify-center overflow-hidden shrink-0 shadow-sm relative group cursor-pointer" @click="document.getElementById('logoInput').click()">
                                <template x-if="config.site_logo">
                                    <img :src="config.site_logo" class="w-full h-full object-contain p-2 group-hover:opacity-50 transition-opacity">
                                </template>
                                <template x-if="!config.site_logo">
                                    <div class="flex flex-col items-center justify-center text-slate-400 group-hover:text-blue-500 transition-colors">
                                        <i class="ph ph-image text-3xl mb-1"></i>
                                    </div>
                                </template>
                                <div class="absolute inset-0 bg-slate-900/50 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                    <i class="ph ph-pencil-simple text-white text-xl"></i>
                                </div>
                            </div>
                            <div class="flex-1 space-y-3">
                                <input type="file" id="logoInput" class="hidden" accept="image/*" @change="uploadLogo($event)">
                                <div class="flex flex-wrap gap-2">
                                    <button @click="document.getElementById('logoInput').click()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg text-sm font-bold transition-all shadow-sm">
                                        <i class="ph ph-upload-simple"></i> Upload Gambar
                                    </button>
                                    <button x-show="config.site_logo" @click="config.site_logo = ''" class="bg-white dark:bg-slate-800 text-red-600 border border-slate-200 dark:border-slate-700 hover:bg-red-50 dark:hover:bg-red-500/10 px-5 py-2.5 rounded-lg text-sm font-bold transition-all shadow-sm">
                                        Hapus
                                    </button>
                                </div>
                                <p class="text-xs text-slate-500">Disarankan format PNG/WebP rasio landscape.</p>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-1.5 border-t border-slate-200 dark:border-slate-700 pt-6">
                        <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">Halaman Utama (Homepage Slug)</label>
                        <div class="flex items-center shadow-sm rounded-xl overflow-hidden border border-slate-300 dark:border-slate-600 focus-within:ring-2 focus-within:ring-blue-500/50">
                            <span class="bg-slate-100 dark:bg-slate-800 px-4 py-2.5 text-slate-500 font-mono text-sm border-r border-slate-300 dark:border-slate-600">/</span>
                            <input type="text" x-model="config.homepage_slug" class="w-full px-4 py-2.5 bg-white dark:bg-slate-900 dark:text-white font-mono text-sm outline-none text-blue-600">
                        </div>
                    </div>
                </div>

                <div class="px-6 py-4 bg-slate-50 dark:bg-slate-800/50 border-t border-slate-200 dark:border-slate-700 flex justify-end">
                    <button @click="saveSettings" :disabled="isSaving" class="bg-slate-900 dark:bg-blue-600 text-white px-8 py-2.5 rounded-xl font-bold hover:bg-slate-800 dark:hover:bg-blue-500 transition-all shadow-md flex items-center gap-2">
                        <i class="ph" :class="isSaving ? 'ph-spinner animate-spin' : 'ph-floppy-disk'"></i> 
                        <span x-text="isSaving ? 'Menyimpan...' : 'Simpan Perubahan'"></span>
                    </button>
                </div>
            </section>

            <section class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden">
                <div class="px-6 py-5 border-b border-slate-200 dark:border-slate-700 bg-slate-50/50 dark:bg-slate-800/50 flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-lg bg-cyan-100 dark:bg-cyan-900/50 flex items-center justify-center text-cyan-600 dark:text-cyan-400">
                            <i class="ph-fill ph-cloud-arrow-up text-lg"></i>
                        </div>
                        <h3 class="font-bold text-lg text-slate-800 dark:text-white">Cloudinary API</h3>
                    </div>
                </div>
                
                <div class="p-6 md:p-8 space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                        <div class="space-y-1.5">
                            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">Cloud Name</label>
                            <input type="text" x-model="cloud.cloud_name" class="w-full px-4 py-2.5 border border-slate-300 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-900 dark:text-white font-mono text-sm outline-none focus:ring-2 focus:ring-cyan-500/50 focus:border-cyan-500">
                        </div>
                        <div class="space-y-1.5">
                            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">API Key</label>
                            <input type="text" x-model="cloud.api_key" class="w-full px-4 py-2.5 border border-slate-300 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-900 dark:text-white font-mono text-sm outline-none focus:ring-2 focus:ring-cyan-500/50 focus:border-cyan-500">
                        </div>
                        <div class="space-y-1.5">
                            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">API Secret</label>
                            <input type="password" x-model="cloud.api_secret" placeholder="••••••••••••" class="w-full px-4 py-2.5 border border-slate-300 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-900 dark:text-white font-mono text-sm outline-none focus:ring-2 focus:ring-cyan-500/50 focus:border-cyan-500">
                        </div>
                    </div>
                </div>
                <div class="px-6 py-4 bg-slate-50 dark:bg-slate-800/50 border-t border-slate-200 dark:border-slate-700 flex justify-end">
                    <button @click="saveCloudinary" class="bg-cyan-600 hover:bg-cyan-700 text-white px-6 py-2.5 rounded-xl text-sm font-bold transition-all shadow-sm">
                        Hubungkan Cloudinary
                    </button>
                </div>
            </section>

            <section class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden">
                <div class="px-6 py-5 border-b border-slate-200 dark:border-slate-700 bg-slate-50/50 dark:bg-slate-800/50 flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-red-100 dark:bg-red-900/50 flex items-center justify-center text-red-600 dark:text-red-400">
                        <i class="ph-fill ph-shield-check text-lg"></i>
                    </div>
                    <h3 class="font-bold text-lg text-slate-800 dark:text-white">Keamanan Akun</h3>
                </div>
                
                <div class="p-6 md:p-8 grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div class="md:col-span-1 text-sm text-slate-600 dark:text-slate-400">
                        <p>Ubah password Anda secara berkala.</p>
                    </div>
                    
                    <div class="md:col-span-2 space-y-5 bg-slate-50 dark:bg-slate-900/30 p-5 md:p-6 rounded-xl border border-slate-200 dark:border-slate-700">
                        <div class="space-y-1.5">
                            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">Password Lama</label>
                            <input type="password" x-model="security.old_pass" class="w-full px-4 py-2.5 border border-slate-300 dark:border-slate-600 rounded-xl bg-white dark:bg-slate-900 dark:text-white outline-none focus:ring-2 focus:ring-red-500/50 focus:border-red-500">
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                            <div class="space-y-1.5">
                                <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">Password Baru</label>
                                <input type="password" x-model="security.new_pass" class="w-full px-4 py-2.5 border border-slate-300 dark:border-slate-600 rounded-xl bg-white dark:bg-slate-900 dark:text-white outline-none focus:ring-2 focus:ring-red-500/50 focus:border-red-500">
                            </div>
                            <div class="space-y-1.5">
                                <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">Konfirmasi</label>
                                <input type="password" x-model="security.confirm_pass" class="w-full px-4 py-2.5 border border-slate-300 dark:border-slate-600 rounded-xl bg-white dark:bg-slate-900 dark:text-white outline-none focus:ring-2 focus:ring-red-500/50 focus:border-red-500">
                            </div>
                        </div>
                        <div class="flex justify-end pt-4">
                            <button @click="changePassword" class="bg-red-600 hover:bg-red-700 text-white px-6 py-2.5 rounded-xl text-sm font-bold transition-all shadow-sm">
                                Update Password
                            </button>
                        </div>
                    </div>
                </div>
            </section>

        </div>
    </admin-layout>

    <script>
        function settingsApp() {
            return {
                token: null, isSaving: false,
                config: { site_name: '', site_desc: '', site_wa: '', site_logo: '', homepage_slug: '' },
                cloud: { cloud_name: '', api_key: '', api_secret: '' },
                security: { old_pass: '', new_pass: '', confirm_pass: '' },
                
                async init() {
                    this.token = localStorage.getItem('admin_pass') || localStorage.getItem('auth_token');
                    if (!this.token) {
                        const cookieMatch = document.cookie.match(/(?:^|; )auth_token=([^;]*)/);
                        if(cookieMatch) this.token = cookieMatch[1];
                    }
                    await this.loadSettings();
                },

                async loadSettings() {
                    try {
                        const res = await fetch('/api/admin/settings', { headers: { 'Authorization': `Bearer ${this.token}` } });
                        if(res.ok) {
                            const data = await res.json();
                            this.config.site_name = data.site_name || '';
                            this.config.site_desc = data.site_desc || '';
                            this.config.site_wa = data.site_wa || '';
                            this.config.site_logo = data.site_logo || '';
                            this.config.homepage_slug = data.homepage_slug || '';
                        }
                    } catch(e) { }
                },

                async saveSettings() {
                    this.isSaving = true;
                    try {
                        const res = await fetch('/api/admin/settings', {
                            method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${this.token}` },
                            body: JSON.stringify(this.config)
                        });
                        if(res.ok) Swal.fire({ icon: 'success', title: 'Tersimpan!', text: 'Identitas diupdate.', timer: 2000, showConfirmButton: false, customClass: { popup: 'rounded-2xl' } });
                    } catch(e) { } finally { this.isSaving = false; }
                },

                async uploadLogo(e) {
                    const file = e.target.files[0]; if(!file) return;
                    Swal.fire({ title: 'Mengunggah...', allowOutsideClick: false, customClass: { popup: 'rounded-2xl' }, didOpen: () => { Swal.showLoading(); } });
                    const fd = new FormData(); fd.append('file', file); fd.append('filename', file.name);
                    try {
                        const res = await fetch('/api/admin/upload-image', { method: 'POST', body: fd, headers: { 'Authorization': `Bearer ${this.token}` } });
                        const json = await res.json();
                        const url = json.data ? json.data[0].src : (json.url || json.secure_url);
                        if(url) {
                            this.config.site_logo = url;
                            Swal.fire({ icon: 'success', title: 'Terunggah!', timer: 2000, showConfirmButton: false, customClass: { popup: 'rounded-2xl' } });
                        }
                    } catch(err) { Swal.fire({ icon: 'error', title: 'Gagal' }); }
                    e.target.value = ''; 
                },

                async saveCloudinary() {
                    if(!this.cloud.cloud_name) return;
                    try {
                        const res = await fetch('/api/admin/credentials', {
                            method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${this.token}` },
                            body: JSON.stringify({ provider: 'cloudinary', data: this.cloud })
                        });
                        if(res.ok) Swal.fire({ icon: 'success', title: 'Tersimpan!', timer: 2000, showConfirmButton: false, customClass: { popup: 'rounded-2xl' } });
                    } catch(e) { }
                },

                async changePassword() {
                    if(!this.security.old_pass || this.security.new_pass !== this.security.confirm_pass) return;
                    try {
                        const res = await fetch('/api/admin/change-password', {
                            method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${this.token}` },
                            body: JSON.stringify({ current_password: this.security.old_pass, new_password: this.security.new_pass })
                        });
                        if(res.ok) Swal.fire({ icon: 'success', title: 'Berhasil!'}).then(() => { localStorage.removeItem('admin_pass'); window.location.href = '/login'; });
                    } catch(e) { }
                }
            }
        }
    </script>
</body>
</html>
