<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="../style.css">
    <script src="/assets/js/layout.js" defer></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-200">
    
    <admin-layout>
        <div x-data="dashboardApp()" x-init="init()" class="w-full">
            <header class="mb-8">
                <h2 class="text-2xl font-bold text-gray-800 dark:text-white">Selamat Datang, Admin!</h2>
                <p class="text-gray-500 dark:text-gray-400 text-sm mt-1">Status rekapitulasi data halaman Anda saat ini.</p>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white dark:bg-gray-800 p-6 rounded-xl border border-gray-100 dark:border-gray-700 shadow-sm flex justify-between items-center">
                    <div>
                        <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">Total Halaman</p>
                        <h3 class="text-3xl font-black text-gray-800 dark:text-white mt-1" x-text="stats.total">0</h3>
                    </div>
                    <div class="h-12 w-12 bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-full flex items-center justify-center text-2xl">
                        <i class="ph ph-files"></i>
                    </div>
                </div>

                <div class="bg-white dark:bg-gray-800 p-6 rounded-xl border border-gray-100 dark:border-gray-700 shadow-sm flex justify-between items-center">
                    <div>
                        <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">Halaman Portfolio</p>
                        <h3 class="text-3xl font-black text-gray-800 dark:text-white mt-1" x-text="stats.portfolio">0</h3>
                    </div>
                    <div class="h-12 w-12 bg-purple-50 dark:bg-purple-900/30 text-purple-600 dark:text-purple-400 rounded-full flex items-center justify-center text-2xl">
                        <i class="ph ph-briefcase"></i>
                    </div>
                </div>

                <div class="bg-white dark:bg-gray-800 p-6 rounded-xl border border-gray-100 dark:border-gray-700 shadow-sm flex justify-between items-center">
                    <div>
                        <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">Halaman Umum</p>
                        <h3 class="text-3xl font-black text-gray-800 dark:text-white mt-1" x-text="stats.general">0</h3>
                    </div>
                    <div class="h-12 w-12 bg-green-50 dark:bg-green-900/30 text-green-600 dark:text-green-400 rounded-full flex items-center justify-center text-2xl">
                        <i class="ph ph-browsers"></i>
                    </div>
                </div>
            </div>
        </div>
    </admin-layout>

    <script>
        function dashboardApp() {
            return {
                stats: { total: 0, portfolio: 0, general: 0 },
                async init() {
                    const token = localStorage.getItem('admin_pass') || localStorage.getItem('auth_token');
                    try {
                        const res = await fetch('/api/admin/pages', { headers: { 'Authorization': `Bearer ${token}` } });
                        if (res.ok) {
                            const data = await res.json();
                            this.stats.total = data.length;
                            this.stats.portfolio = data.filter(p => p.slug && p.slug.toLowerCase().includes('portofolio-')).length;
                            this.stats.general = this.stats.total - this.stats.portfolio;
                        }
                    } catch (e) { console.error("Gagal:", e); }
                }
            }
        }
    </script>
</body>
</html>
